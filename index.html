<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shariq Digital SEO | Professional SEO Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#071524;
color:white;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
background:#0b1f36;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.3);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:700;
color:#f7c948;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#f7c948;
}

.hero{
padding:160px 8% 100px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.hero-text{
max-width:600px;
}

.hero-text h1{
font-size:55px;
line-height:1.2;
margin-bottom:20px;
}

.hero-text span{
color:#f7c948;
}

.hero-text p{
font-size:18px;
color:#d4d4d4;
line-height:1.8;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:15px 35px;
background:#f7c948;
color:#071524;
text-decoration:none;
font-weight:bold;
border-radius:40px;
transition:.3s;
}

.btn:hover{
transform:translateY(-4px);
}

.hero-box{
width:380px;
height:380px;
background:linear-gradient(135deg,#f7c948,#ffdd75);
border-radius:30px;
display:flex;
justify-content:center;
align-items:center;
font-size:120px;
color:#071524;
font-weight:bold;
}

section{
padding:90px 8%;
}

.title{
text-align:center;
font-size:40px;
margin-bottom:50px;
color:#f7c948;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:#102842;
padding:30px;
border-radius:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card h3{
margin-bottom:15px;
color:#f7c948;
}

.about{
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
align-items:center;
}

.about img{
width:100%;
border-radius:20px;
}

.about p{
line-height:1.9;
color:#d4d4d4;
}

.contact{
text-align:center;
}

.contact h3{
font-size:30px;
margin-bottom:20px;
}

.contact p{
margin:10px 0;
font-size:18px;
}

footer{
background:#04101d;
padding:30px;
text-align:center;
color:#bbb;
}

@media(max-width:900px){

.hero{
text-align:center;
}

.hero-box{
margin-top:40px;
width:100%;
height:250px;
font-size:80px;
}

.about{
grid-template-columns:1fr;
}

nav{
display:none;
}

.hero-text h1{
font-size:40px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
Shariq Digital SEO
</div>

<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#services">Services</a>
<a href="#contact">Contact</a>
</nav>

</header>

<section class="hero" id="home">

<div class="hero-text">

<h1>
Grow Your Business with
<span>Professional SEO</span>
</h1>

<p>
I help businesses increase Google rankings, drive organic traffic, build high-quality backlinks, and grow online with proven SEO strategies.
</p>

<a href="#contact" class="btn">
Hire Me
</a>

</div>

<div class="hero-box">
SEO
</div>

</section>
